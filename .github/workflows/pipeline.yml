name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  security:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          echo "Verificando arquivos..."
          ls src/
          echo "Build OK!"

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: |
          semgrep scan \
          --config auto \
          -- error \
          src/
      
      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubsercontent.com/anchore/grype/main/instal.sh | sh
      
      - name: Run Grype
        run: |
          ./bin/grype dir:. --fail-on medium

      - name: Deploy
        run: |
          echo "Deploy realizado com sucesso!"